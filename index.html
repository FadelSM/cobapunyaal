<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paxley Script - AL Developer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --bg: #090909;
            --accent: #00d4ff;
            --muted: #a6a6a6;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Foto Profil & Animasi */
        .profile-container {
            position: relative;
            margin-bottom: 20px;
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            padding: 5px;
            object-fit: cover;
        }

        .floating-icon {
            position: absolute;
            width: 25px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Teks & Tombol */
        .title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(to right, #00d4ff, #0055ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .dev-name {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .link-card {
            width: 100%;
            max-width: 400px;
            background: #1a1a1a;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .link-card:hover {
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .link-card i {
            margin-right: 15px;
            color: var(--accent);
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <img src="https://em-content.zobj.net/source/apple/354/crown_1f451.png" class="floating-icon" style="top: -20px; left: 40px;">
        <img src="https://raw.githubusercontent.com/SwipFvck/upload/main/image/1778182277507_ej70wk4y9gg.jpeg" class="avatar" alt="Profile">
    </div>

    <div class="title">Paxley Script</div>
    <div class="dev-name">Developer: @AlzX7zz</div>

    <a href="#" class="link-card">
        <i class="fas fa-play"></i>
        <span>Lihat Demo Video</span>
    </a>
    <a href="#" class="link-card">
        <i class="fab fa-whatsapp"></i>
        <span>Hubungi Developer</span>
    </a>
    <a href="#" class="link-card">
        <i class="fas fa-shopping-cart"></i>
        <span>Beli Script</span>
    </a>

    <audio id="audio" loop>
        <source src="https://raw.githubusercontent.com/SwipFvck/upload/main/audio/1778499466469_goosjrmw4x6.mp4" type="audio/mp3">
    </audio>

    <script>
        // Memutar musik saat klik pertama kali
        document.body.addEventListener('click', () => {
            document.getElementById('audio').play();
        }, { once: true });
    </script>

</body>
</html>
