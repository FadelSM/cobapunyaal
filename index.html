<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paxley - AL Developer</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg:#090909;
      --card-bg:#121212;
      --muted:#a6a6a6;
      --accent:#00d4ff;
      --red-accent:#ff4d4d;
    }
    body {
      font-family:"Poppins", sans-serif;
      background:var(--bg);
      color:#fff;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:40px 15px;
      overflow-x:hidden;
    }
    .avatar-wrap {
      position:relative;
      width:120px;
      height:120px;
      margin:0 auto 25px;
    }
    .avatar {
      width:100%;
      height:100%;
      border-radius:50%;
      overflow:hidden;
      z-index:2;
      border:2px solid var(--accent);
    }
    .avatar img { width:100%; height:100%; object-fit:cover; }
    .premium-text {
      text-align:center;
      font-weight:bold;
      background:linear-gradient(90deg, #00cfff, #00a2ff, #5ce1ff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation:glow 2s infinite alternate;
    }
    @keyframes glow {
      from { filter:brightness(1); }
      to { filter:brightness(1.3); }
    }
    .btn {
      background:var(--accent);
      color:#000;
      padding:14px;
      border-radius:12px;
      text-decoration:none;
      font-weight:600;
      display:flex;
      justify-content:center;
      gap:8px;
      margin-top:10px;
      width:100%;
    }
  </style>
</head>
<body>
  <div class="avatar-wrap">
    <div class="avatar">
      <img src="https://raw.githubusercontent.com/SwipFvck/upload/main/image/1778182277507_ej70wk4y9gg.jpeg">
    </div>
  </div>

  <h1 class="premium-text">Paxley Script</h1>
  <p style="color:var(--muted);">Developer: @AlzX7zz</p>

  <div style="width:100%; max-width:440px;">
    <a href="#" class="btn"><i class="fas fa-play"></i> Lihat Video</a>
    <a href="#" class="btn" style="background:transparent; border:1px solid #333; color:#fff;">Hubungi Kami</a>
  </div>

  <audio id="bgMusic" loop>
    <source src="https://raw.githubusercontent.com/SwipFvck/upload/main/audio/1778499466469_goosjrmw4x6.mp4" type="audio/mp3">
  </audio>

  <script>
    const music = document.getElementById("bgMusic");
    document.body.addEventListener('click', () => {
      music.play();
    }, { once:true });
  </script>
</body>
</html>
